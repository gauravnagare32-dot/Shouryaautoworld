<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shourya Auto World</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Shourya Auto World Logo" />
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#inventory">Car Inventory</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <section id="hero">
        <h1>Welcome to Shourya Auto World</h1>
        <p>Your dream car awaits!</p>
    </section>
    <section id="inventory">
        <h2>Our Cars</h2>
        <div class="car-list">
            <div class="car-item">Car 1</div>
            <div class="car-item">Car 2</div>
            <div class="car-item">Car 3</div>
        </div>
    </section>
    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required />
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 Shourya Auto World. All rights reserved.</p>
    </footer>
</body>
</html>
