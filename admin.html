<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Car Inventory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Car Inventory Admin Panel</h1>
    <form id="add-car-form">
        <h2>Add New Car</h2>
        <label for="brand">Brand:</label>
        <input type="text" id="brand" name="brand" required>

        <label for="model">Model:</label>
        <input type="text" id="model" name="model" required>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" required>

        <label for="year">Year:</label>
        <input type="number" id="year" name="year" required>

        <label for="transmission">Transmission:</label>
        <select id="transmission" name="transmission" required>
            <option value="manual">Manual</option>
            <option value="automatic">Automatic</option>
        </select>

        <label for="fuel-type">Fuel Type:</label>
        <select id="fuel-type" name="fuel-type" required>
            <option value="petrol">Petrol</option>
            <option value="diesel">Diesel</option>
            <option value="electric">Electric</option>
        </select>

        <label for="mileage">Mileage:</label>
        <input type="number" id="mileage" name="mileage" required>

        <button type="submit">Add Car</button>
    </form>

    <script>
        document.getElementById('add-car-form').onsubmit = function(e) {
            e.preventDefault();
            // Appending code to add new car details to the inventory
            alert('New car added!');
            this.reset();
        };
    </script>
</body>
</html>
